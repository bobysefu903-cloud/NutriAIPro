name: NutriAIPro
options:
  bundleIdPrefix: com.nutriai
targets:
  NutriAIPro:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
      - path: ContentView.swift
      - path: NutriAIProApp.swift
      - path: iOS26Extensions.swift
    info:
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: "Camera este necesară pentru a scana codul de bare al produselor alimentare."
        NSHealthShareUsageDescription: "Aplicația necesită acces la datele tale de sănătate pentru a calcula caloriile."
        NSHealthUpdateUsageDescription: "Aplicația necesită acces pentru a actualiza datele de sănătate."
